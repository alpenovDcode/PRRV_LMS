<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Воронка Salebot — визуальный предпросмотр</title>
<style>
  :root {
    --bg: #f7f4f0;
    --grid: rgba(0,0,0,.04);
    --ink: #1a1a1a;
    --muted: #7a7a7a;
  }
  * { box-sizing: border-box; margin: 0; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Inter", Arial, sans-serif; }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 16px; background: rgba(255,255,255,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid #eaeaea;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .topbar h1 { font-size: 14px; font-weight: 700; }
  .stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .stats b { color: var(--ink); font-weight: 700; }
  .legend { display: flex; gap: 10px; font-size: 11px; flex-wrap: wrap; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
  .controls { margin-left: auto; font-size: 11px; color: var(--muted); }

  #viewport {
    position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  #viewport:active { cursor: grabbing; }
  #stage { position: absolute; transform-origin: 0 0; }
  #stage svg { position: absolute; top: 0; left: 0; pointer-events: none; }

  .node {
    position: absolute; width: 280px; min-height: 110px;
    background: #fff; border: 2px solid #ddd; border-radius: 12px;
    padding: 10px 12px; font-size: 12px; line-height: 1.35;
    box-shadow: 0 2px 8px rgba(0,0,0,.04); cursor: pointer;
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .node:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.1); z-index: 2; }
  .node .ttl { font-weight: 700; font-size: 12px; color: #111; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
  .node .sub { margin-top: 6px; font-size: 11px; color: var(--muted); }

  .node.entry   { border-color: #f15a25; background: #fff5ef; }
  .node.trigger { border-color: #6f3fc0; background: #f3edff; }
  .node.message { border-color: #2563eb; background: #eff5ff; }
  .node.nudge   { border-color: #d97706; background: #fff4e0; }
  .node.http    { border-color: #059669; background: #e5fbf0; }
  .node.note    { border-color: #6b7280; background: #f1f3f5; opacity: .85; }

  .legend .entry b   { background:#f15a25;}
  .legend .trigger b { background:#6f3fc0;}
  .legend .message b { background:#2563eb;}
  .legend .nudge b   { background:#d97706;}
  .legend .http b    { background:#059669;}
  .legend .note b    { background:#6b7280;}

  .conn-label {
    fill: #6b7280; font-size: 10px; font-family: monospace;
  }

  #detail {
    position: fixed; top: 70px; right: 16px; width: 380px; max-height: calc(100vh - 90px);
    background: #fff; border: 1px solid #eaeaea; border-radius: 12px;
    padding: 14px 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08);
    overflow-y: auto; display: none; z-index: 5;
    font-size: 13px; line-height: 1.5;
  }
  #detail.visible { display: block; }
  #detail h2 { font-size: 14px; margin-bottom: 4px; }
  #detail .close { position: absolute; right: 8px; top: 8px; cursor: pointer; color: #999; font-size: 18px; padding: 4px 8px; }
  #detail .meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; font-family: monospace; }
  #detail pre { background: #f7f7f9; padding: 8px; border-radius: 6px; font-size: 11px; white-space: pre-wrap; word-break: break-word; max-height: 180px; overflow-y: auto; margin-top: 6px; }
  #detail .row { margin-top: 10px; } #detail .row b { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 2px; }
</style>
</head>

нь отработали</b>\r\n\r\nКоллега, спасибо большое за сегодняшний вебинар!\r\n\r\nНу а теперь приступаем к практическому заданию, которое я дала на вебинаре!\r\n\r\n<b>Еще раз повторю, что нужно сделать:</b>\r\n🤍 выбрать тип интенсива (повторение или тематический);\r\n🤍 определить конкретную тему (где у учеников «затык»);\r\n🤍 прописать программу (1 встреча = 1 блок);\r\n🤍 зафиксировать чёткий результат", "raw": {"condition": "#{none}", "buttons": "", "variables": "", "post_params": "", "saved_variables": "", "action_url": "", "attachment_type": "image", "message_type": 0}}, {"id": 62338575, "x": 1630, "y": 2795, "cls": "message", "title": "Дожим на ВИП", "subtitle": "🔘 1 кнопок", "preview": "<b>#{name}, кстати 👇</b>\r\n\r\nЕсли что-то из сегодняшнего эфира не успели записать или хотите пересмотреть отдельный момент — в ВИП есть запись.\r\n\r\nНу и если остались вопросы по своей ситуации — там же куратор, которому можно написать и получить ответ именно под вас.\r\n\r\nПлюс в ВИП входит бесплатная диагностическая сессия с экспертом — можно разобрать, как именно вам выстроить группы, без общих слов.", "raw": {"condition": "#{none}", "buttons": "[{\"line\":0,\"index_in_line\":0,\"text\":\"СТАТЬ ВИП УЧАСТНИКОМ\",\"type\":\"inline\",\"url\":\"#{autointensive0426_vip_link_proxy}\",\"callback_link\":false}]", "variables": "", "post_params": "", "saved_variables": "", "action_url": "", "attachment_type": "", "message_type": 0}}, {"id": 62338576, "x": 2200, "y": 2150, "cls": "message", "title": "За 2 часа", "subtitle": "", "preview": "ВСЕ подарки и полная кодовая фраза сегодня выдам на заключительном эфире через 2ч! 🎁\r\n\r\nВас ждут:\r\n🎁«Лето без просадки: 5 действий, которые нужно предпринять уже сейчас»\r\n🎁 «5 типов \"неудобных\" учеников» \r\n🎁 Гайд «7 готовых формулировок, как отказать в переносе, не потеряв ученика» \r\n\r\nСегодня разберём:\r\n— как не просесть в доходе летом и заполнить расписание ещё до начала сезона\r\n— стратегию прод", "raw": {"condition": "#{none}", "buttons": "", "variables": "", "post_params": "", "saved_variables": "", "action_url": "", "attachment_type": "", "message_type": 0}}, {"id": 62338577, "x": 2200, "y": 2795, "cls": "message", "title": "Дожим на ВИП", "subtitle": "🔘 1 кнопок", "preview": "#{name}, кстати, а практические задания сделали?\r\n\r\nЕсли да — супер! Скоро начнётся выдача сертификатов, чуть позже расскажу, как его получить. \r\n\r\nЕсли понимаете, что вам нужна обратная связь по своей ситуации, в ВИП можно отправить выполненные задания куратору и на диагностической сессии с экспертом подробно разобрать дальнейшие шаги.", "raw": {"condition": "#{none}", "buttons": "[{\"line\":0,\"index_in_line\":0,\"text\":\"СТАТЬ ВИП УЧАСТНИКОМ\",\"type\":\"inline\",\"url\":\"#{autointensive0426_vip_link_proxy}\",\"callback_link\":false}]", "variables": "", "post_params": "", "saved_variables": "", "action_url": "", "attachment_type": "", "message_type": 0}}, {"id": 62338578, "x": 1060, "y": 2630, "cls": "message", "title": "Через 2 часа после окончания эфира", "subtitle": "⚙ 2 перем.", "preview": "<b>Проверила ваши практические задания 👀</b>\r\n\r\nОсобенно для тех, кто на тарифе без обратной связи — это ваш шанс скорректировать задание до завтрашнего эфира. \r\n\r\nЗаписала небольшой подкаст с разбором типичных ошибок.\r\n\r\nРазобрала по шагам:\r\n⏺️ как сформулировать тему интенсива, чтобы в разы больше людей захотели записаться\r\n⏺️ что должно быть в программе, чтобы родитель сразу понял ценность\r\n⏺️ ", "raw": {"condition": "#{none}", "buttons": "", "variables": "tg_send_voice(platform_id, 'AwACAgIAAxkBAAEBUTJp-GqxnOf912ZSFn7PIVNuqYl9NQACWZQAAjX9OEvTeCue9trMHTsE')\r\n\r\ntext_max = if(client_type == 20, 'Слушать подкаст: https://disk.yandex.ru/d/ZO3eWxaJs26jjQ', '')", "post_params": "", "saved_variables": "", "action_url": "", "attachment_type": "", "message_type": 0}}, {"id": 62338579, "x": 2120, "y": 1760, "cls": "nudge", "title": "После реги | ТГ", "subtitle": "🔘 1 кнопок", "preview": "#{n  {"a": 62338630, "b": 62338584, "label": "⏱ random(8,15)s"}, {"a": 62338630, "b": 62338565, "label": "🕐 23:59 📅 autointensive0426_date_d3"}, {"a": 62338630, "b": 62338591, "label": "⏱ 30s"}, {"a": 62338630, "b": 62338635, "label": "⏱ 15s"}, {"a": 62338633, "b": 62338632, "label": "⏱ random(3,7)s"}, {"a": 62338634, "b": 62338494, "label": "if client_type == 20 and tg_track == 1"}, {"a": 62338634, "b": 62338562, "label": "⏱ random(3,7)s"}, {"a": 62338634, "b": 62338642, "label": "⏱ random(1,5)s 🕐 autointensive0426_time + 360 📅 autointensive0426_date_d1 + autointensive0426_date_correct"}, {"a": 62338634, "b": 62338640, "label": "⏱ random(1,5)s 🕐 autointensive0426_time + 360 📅 autointensive0426_date_d2 + autointensive0426_date_correct"}, {"a": 62338634, "b": 62338561, "label": "⏱ random(1,5)s 🕐 autointensive0426_time + 360 📅 autointensive0426_date_d3 + autointensive0426_date_correct"}, {"a": 62338636, "b": 62338568, "label": "⏱ random(3,7)s"}, {"a": 62338639, "b": 62338571, "label": "⏱ 24s 🕐 12:00"}, {"a": 62338643, "b": 62338630, "label": ""}, {"a": 62338643, "b": 62338556, "label": "⏱ random(3,7)s"}, {"a": 62338644, "b": 62338570, "label": ""}, {"a": 62338644, "b": 62338652, "label": "⏱ random(3,7)s"}];
const W = 280, H = 110;

const nodeById = new Map(NODES.map(n => [n.id, n]));

// Рендер нод
const nodesEl = document.getElementById('nodes');
for (const n of NODES) {
  const div = document.createElement('div');
  div.className = 'node ' + n.cls;
  div.style.left = n.x + 'px';
  div.style.top = n.y + 'px';
  div.innerHTML = '<div class="ttl"></div><div class="sub"></div>';
  div.querySelector('.ttl').textContent = n.title;
  div.querySelector('.sub').textContent = n.subtitle;
  div.onclick = (e) => { e.stopPropagation(); showDetail(n); };
  nodesEl.appendChild(div);
}

// Рендер связей (SVG path с marker-end)
const svg = document.getElementById('edges');
svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
defs.innerHTML = '<marker id="arr" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#888"/></marker>';
svg.appendChild(defs);

for (const c of CONNS) {
  const a = nodeById.get(c.a), b = nodeById.get(c.b);
  if (!a || !b) continue;
  const x1 = a.x + W/2, y1 = a.y + H/2;
  const x2 = b.x + W/2, y2 = b.y + H/2;
  // bezier контроль для аккуратной кривой
  const dx = x2 - x1, dy = y2 - y1;
  const curve = Math.min(80, Math.abs(dx) * 0.3 + Math.abs(dy) * 0.15);
  const cx1 = x1 + curve, cy1 = y1;
  const cx2 = x2 - curve, cy2 = y2;
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
  p.setAttribute('stroke', '#a8a8a8');
  p.setAttribute('stroke-width', '1.2');
  p.setAttribute('fill', 'none');
  p.setAttribute('marker-end', 'url(#arr)');
  svg.appendChild(p);
  if (c.label) {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', (x1 + x2) / 2);
    t.setAttribute('y', (y1 + y2) / 2 - 6);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('class', 'conn-label');
    t.textContent = c.label;
    svg.appendChild(t);
  }
}

// Pan & zoom
const viewport = document.getElementById('viewport');
const stage = document.getElementById('stage');
let scale = 0.5, tx = 0, ty = 0;
function applyT() { stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; }
applyT();

let dragging = false, sx = 0, sy = 0, stx = 0, sty = 0;
viewport.addEventListener('mousedown', (e) => {
  dragging = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  tx = stx + (e.clientX - sx);
  ty = sty + (e.clientY - sy);
  applyT();
});
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const newScale = Math.min(2, Math.max(0.1, scale * delta));
  // zoom-to-cursor
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyT();
}, { passive: false });

// Show node detail
function showDetail(n) {
  const d = document.getElementById('detail');
  document.getElementById('d-title').textContent = n.title;
  document.getElementById('d-meta').textContent = `${n.cls} · id ${n.id}`;
  const body = document.getElementById('d-body');
  body.innerHTML = '';
  const rows = [];
  if (n.preview) rows.push(['Текст', `<pre>${escape(n.preview)}</pre>`]);
  for (const k of ['condition','buttons','variables','post_params','saved_variables','action_url']) {
    const v = n.raw[k];
    if (v && String(v).trim() && v !== '#{none}') {
      rows.push([k, `<pre>${escape(String(v))}</pre>`]);
    }
  }
  rows.push(['Исходящие связи', outgoingHTML(n.id)]);
  rows.push(['Входящие связи', incomingHTML(n.id)]);
  for (const [label, htmlStr] of rows) {
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `<b>${label}</b>${htmlStr}`;
    body.appendChild(div);
  }
  d.classList.add('visible');
}
function escape(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }
function outgoingHTML(id) {
  const outs = CONNS.filter(c => c.a === id);
  if (!outs.length) return '<span style="color:#999">нет</span>';
  return outs.map(c => `<div>→ <b>${escape(nodeById.get(c.b)?.title || c.b)}</b> <span style="color:#999">${escape(c.label)}</span></div>`).join('');
}
function incomingHTML(id) {
  const ins = CONNS.filter(c => c.b === id);
  if (!ins.length) return '<span style="color:#999">нет</span>';
  return ins.map(c => `<div>← <b>${escape(nodeById.get(c.a)?.title || c.a)}</b> <span style="color:#999">${escape(c.label)}</span></div>`).join('');
}

// Центрируем canvas при старте
window.addEventListener('load', () => {
  const rect = viewport.getBoundingClientRect();
  tx = (rect.width - 4210 * scale) / 2;
  ty = 20;
  applyT();
});
</script>
