services:
  postgres:
    image: postgres:16-alpine
    container_name: proryv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proryv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proryv_password}
      POSTGRES_DB: ${POSTGRES_DB:-proryv_lms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proryv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proryv_network

  redis:
    image: redis:7-alpine
    container_name: proryv_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proryv_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proryv_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-proryv}:${POSTGRES_PASSWORD:-proryv_password}@postgres:5432/${POSTGRES_DB:-proryv_lms}
      DIRECT_URL: postgresql://${POSTGRES_USER:-proryv}:${POSTGRES_PASSWORD:-proryv_password}@postgres:5432/${POSTGRES_DB:-proryv_lms}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_STREAM_CUSTOMER_CODE: ${CLOUDFLARE_STREAM_CUSTOMER_CODE}
      NEXT_PUBLIC_CLOUDFLARE_STREAM_CUSTOMER_CODE: ${NEXT_PUBLIC_CLOUDFLARE_STREAM_CUSTOMER_CODE}
      # R2 Storage
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: /api/assets
      # API Protection
      API_SECRET_KEY: ${API_SECRET_KEY}
      NODE_ENV: production
      # ---- Bot platform (own SaleBot-alternative) ----
      # AES-256-GCM key for encrypting bot tokens in DB.
      # Generate once: `openssl rand -hex 32`. NEVER rotate without a
      # migration of existing tokens or they become unreadable.
      TG_TOKEN_ENC_KEY: ${TG_TOKEN_ENC_KEY}
      # Bearer token for /api/tg-cron/tick. The tg-cron sidecar below
      # uses it to drive delay + wait_reply timeouts every 20s.
      TG_CRON_SECRET: ${TG_CRON_SECRET}
      # Externally-reachable base URL — needed by redirect-tracking to
      # build /r/<slug> click-through URLs in outbound buttons.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-${NEXT_PUBLIC_APP_URL:-http://localhost:3000}}
      # ---- Misc telegram (notifications about LMS questions) ----
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_QUESTIONS_CHAT_ID: ${TELEGRAM_QUESTIONS_CHAT_ID:-}
      # AI homework checker (external Flask bot)
      AI_CHECKER_URL: ${AI_CHECKER_URL}
      AI_CHECKER_KEY: ${AI_CHECKER_KEY}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proryv_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # Sidecar that drives the bot-platform flow engine. Hits
  # /api/tg-cron/tick every 20s. Without it, `delay`-nodes and
  # `wait_reply` timeouts never fire — runs hang in `sleeping` /
  # `waiting_reply` forever.
  tg-cron:
    image: curlimages/curl:8.10.1
    container_name: proryv_tg_cron
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      TG_CRON_SECRET: ${TG_CRON_SECRET}
    entrypoint:
      - sh
      - -c
      - |
        echo "[tg-cron] starting, tick every 20s";
        while true; do
          curl -fsS -X POST \
            -H "Authorization: Bearer $$TG_CRON_SECRET" \
            http://app:3000/api/tg-cron/tick \
            -o /tmp/tick.log 2>/dev/null \
            && cat /tmp/tick.log \
            || echo "[tg-cron] tick failed";
          echo;
          sleep 20;
        done
    networks:
      - proryv_network

  nginx:
    image: nginx:alpine
    container_name: proryv_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      # SSL port commented out for development (no certificates)
      # - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount only development config (no SSL)
      - ./nginx/conf.d/proryv-lms.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html/static:ro
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - proryv_network

volumes:
  postgres_data:
  redis_data:

networks:
  proryv_network:
    driver: bridge

